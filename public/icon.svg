<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#07101f"/>
      <stop offset="100%" stop-color="#0b1d38"/>
    </linearGradient>
    <radialGradient id="ambient" cx="256" cy="256" r="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00e5c4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00e5c4" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark gradient background — iOS masks to squircle automatically -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- Ambient teal glow in center -->
  <circle cx="256" cy="256" r="220" fill="url(#ambient)"/>

  <!-- Wheel (outer ring + 4 spokes + center dot), with soft glow -->
  <g filter="url(#glow)">
    <!-- Outer ring: r=168 → edges at 88 and 424 -->
    <circle cx="256" cy="256" r="168" stroke="#00e5c4" stroke-width="10" fill="none"/>

    <!-- Top spoke: outer edge (y=88) → center dot edge (y=224) -->
    <line x1="256" y1="88"  x2="256" y2="224" stroke="#00e5c4" stroke-width="10" stroke-linecap="round"/>
    <!-- Bottom spoke -->
    <line x1="256" y1="288" x2="256" y2="424" stroke="#00e5c4" stroke-width="10" stroke-linecap="round"/>
    <!-- Left spoke -->
    <line x1="88"  y1="256" x2="224" y2="256" stroke="#00e5c4" stroke-width="10" stroke-linecap="round"/>
    <!-- Right spoke -->
    <line x1="288" y1="256" x2="424" y2="256" stroke="#00e5c4" stroke-width="10" stroke-linecap="round"/>

    <!-- Center dot: r=32 -->
    <circle cx="256" cy="256" r="32" fill="#00e5c4"/>
  </g>
</svg>
