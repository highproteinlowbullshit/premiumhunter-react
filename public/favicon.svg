<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Dark navy rounded background -->
  <rect width="32" height="32" rx="7" fill="#040d1a"/>
  <!-- Teal wheel: outer ring -->
  <circle cx="16" cy="16" r="10" stroke="#00e5c4" stroke-width="2" fill="none"/>
  <!-- Center hub -->
  <circle cx="16" cy="16" r="2.8" fill="#00e5c4"/>
  <!-- Spokes: top, bottom, left, right -->
  <line x1="16" y1="6"  x2="16" y2="13.2" stroke="#00e5c4" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="18.8" x2="16" y2="26" stroke="#00e5c4" stroke-width="2" stroke-linecap="round"/>
  <line x1="6"  y1="16" x2="13.2" y2="16" stroke="#00e5c4" stroke-width="2" stroke-linecap="round"/>
  <line x1="18.8" y1="16" x2="26" y2="16" stroke="#00e5c4" stroke-width="2" stroke-linecap="round"/>
</svg>
